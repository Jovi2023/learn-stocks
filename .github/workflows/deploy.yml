# GitHub Pages 自动部署
name: Deploy VitePress to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v4
      
      # 构建 VitePress 博客
      - run: npm ci
      - run: npx vitepress build docs
      
      # 构建量化控制台
      - name: Build Quant Console
        run: |
          cd quant-console
          npm ci
          npm run build
          cp -r dist ../docs/.vitepress/dist/quant-console
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
