# GitHub Pages 自动部署 — 量化控制台
name: Deploy Quant Console to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v4

      - name: Build Quant Console
        run: |
          cd quant-console
          npm ci
          npm run build

      - name: Prepare Pages Structure
        run: |
          mkdir -p _site/learn-stocks/quant-console
          cp -r quant-console/dist/* _site/learn-stocks/quant-console/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
