name = "kai-github-proxy"
main = "github-proxy.js"
compatibility_date = "2026-05-20"

# 显式启用 workers.dev 公网路由（子域 jovi2023.workers.dev 注册后必须 redeploy 才会绑上）
workers_dev = true

# 非敏感配置 —— GITHUB_TOKEN 走 `wrangler secret put`，不在这里
[vars]
REPO_OWNER = "Jovi2023"
REPO_NAME = "learn-stocks"
ALLOWED_ORIGINS = "https://jovi2023.github.io,https://console.jovi-trade.cn,http://localhost:5173,http://localhost:5174"
